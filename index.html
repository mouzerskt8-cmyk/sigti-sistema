<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGTI | Sistema de Gestão TI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
    <body>             
     
        <div id="modal-termo">
        <div class="modal-content" id="print-area">
        </div> </div>

        <div id="login-screen">
        <div class="login-box">
            <h2>SIGTI COTEC</h2>

            <form onsubmit="fazerLogin(); return false;">

                <div style="margin-bottom: 16px;">
                    <label style="display:block; margin-bottom:8px; font-size:13px; color:#475569">
                        E-mail Corporativo
                    </label>
                    <input type="email" id="log-email" placeholder="nome@cotec.com.br" required>
                </div>

                <div style="margin-bottom: 24px;">
                    <label style="display:block; margin-bottom:8px; font-size:13px; color:#475569">
                        Senha de Acesso
                    </label>
                    <input type="password" id="log-senha" placeholder="••••••••" required>
                </div>

                <button type="submit" style="width: 100%;">
                    ACESSAR SISTEMA
                </button>

            </form>

            <p id="login-error"
            style="color:var(--danger); font-size:12px; margin-top:16px; text-align:center; display:none;">
            Credenciais inválidas. Tente novamente.
            </p>

        </div> </div>

        <div class="sidebar" id="sidebar" style="display: none;">
    <h1>SIGTI</h1>

    <div id="user-info" style="padding: 0 12px 32px 12px; border-bottom: 1px solid #1e293b; margin-bottom: 32px;">
        <div style="font-size: 14px; font-weight: 600;" id="user-name">Carregando...</div>
        <div style="font-size: 12px; color: #64748b;" id="user-role">Setor TI</div>
    </div>

    <div class="nav-group">
        <div class="nav-label">Menu Principal</div>
        <div class="nav-item active" onclick="navegar('solicitacoes', this)"><span>📝</span> Ordens de Serviço</div>
        <div class="nav-item" onclick="navegar('termos', this)"><span>📄</span> Meus Termos</div>
        
        <div class="nav-item" onclick="navegar('perfil', this)"><span>👤</span> Meu Perfil</div>
    </div>

    <div id="admin-menu" style="display: none;">
        <div class="nav-group">
            <div class="nav-label">Administração TI</div>
            <div class="nav-item" onclick="navegar('usuarios', this)"><span>👥</span> Gestão de Pessoas</div>
            <div class="nav-item" onclick="navegar('estoque', this)"><span>📦</span> Controle de Estoque</div>
            <div class="nav-item" onclick="navegar('historico', this)"><span>🕘</span> Devoluções/Auditoria</div>
        </div> 
    </div>

    <div style="margin-top: auto;">
        <div class="nav-item" onclick="toggleTheme()"><span>🌓</span> Alternar Tema</div>
        <div class="nav-item" onclick="logout()" style="color: #f87171;"><span>🚪</span> Sair do Sistema</div>
    </div>
</div>

        <main class="main-content" id="app" style="display: none;">
            <div id="view-container"></div>
        </main>

        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="js/config.js"></script>
        <script src="js/app.js"></script>
</body>
</html>
